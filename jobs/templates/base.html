{% load static %}
<!DOCTYPE html>
<html>

<head>
    <title>Job Portal</title>

    <!-- CSS -->
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
</head>

<body>

    <!-- 🔥 NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">

            <a class="navbar-brand fw-bold" href="/">🚀 JobPortal</a>

            <div>

                <!-- Common -->
                <a href="/" class="btn btn-light me-2">Jobs</a>

                {% if user.is_authenticated %}

                <!-- 👤 User Dashboard -->
                <a href="/dashboard/" class="btn btn-warning me-2">Dashboard</a>

                <!-- 🏢 HR Panel (Only Employer) -->
                {% if user.groups.all.0.name == 'Employer' %}
                <a href="/employer-dashboard/" class="btn btn-info me-2">HR Panel</a>
                {% endif %}

                <!-- 🔥 Logout (POST method FIX) -->
                <form action="{% url 'logout' %}" method="post" style="display:inline;">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">Logout</button>
                </form>

                {% else %}

                <!-- 🔐 Login -->
                <a href="{% url 'login' %}" class="btn btn-success">Login</a>

                {% endif %}

            </div>

        </div>
    </nav>

    <!-- 🔥 CONTENT -->
    <div class="container mt-4">
        {% block content %}
        {% endblock %}
    </div>

</body>

</html>
