{% extends 'base.html' %}

{% block content %}

<h2 class="text-white mb-4">Find Your Dream Job 🚀</h2>

<!-- 🔍 Search Bar -->
<form method="GET" class="mb-4 d-flex">
    <input type="text" name="q" class="form-control me-2 search-bar" placeholder="Search jobs...">
    <button class="btn btn-primary">Search</button>
</form>

<div class="row">

{% for job in jobs %}

<div class="col-md-6 mb-4">

    <div class="job-card">

        <h4>{{ job.title }}</h4>

        <p class="text-muted">{{ job.company }}</p>

        <p><b>Location:</b> {{ job.location }}</p>

        <p>{{ job.description|truncatewords:20 }}</p>

        <a href="{% url 'job_detail' job.id %}" class="btn btn-dark btn-sm">
            View Job
        </a>

    </div>

</div>

{% empty %}

<p class="text-white">No jobs found 😢</p>

{% endfor %}

</div>

{% endblock %}
